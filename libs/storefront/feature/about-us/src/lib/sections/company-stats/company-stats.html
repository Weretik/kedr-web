<div
  class="bg-neutral-50 dark:bg-surface-900 p-8 md:p-12 lg:p-20 flex flex-col justify-center items-center gap-12"
>
  <div class="flex flex-col items-center gap-4 max-w-4xl">
    <div
      class="text-surface-900 dark:text-surface-0 text-3xl md:text-5xl font-bold leading-tight text-center"
    >
      {{ sectionTitle() }}
    </div>
    <div
      class="text-surface-600 dark:text-surface-200 text-base md:text-xl font-normal leading-normal text-center"
    >
      {{ sectionDescription() }}
    </div>
  </div>

  <div class="w-full">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">
      @for (item of stats(); track item.value) {
      <div
        class="rounded-xl border border-surface-200 dark:border-surface-700 bg-surface-0 dark:bg-surface-800 p-5 md:p-6 lg:p-8 flex flex-col gap-4"
      >
        <div class="flex items-start gap-4">
          <i [ngClass]="item.icon" class="text-3xl! text-primary mt-1"></i>
          <div class="flex flex-col gap-1">
            <div
              class="text-surface-900 dark:text-surface-0 text-3xl font-bold leading-tight"
            >
              {{ item.value }}
            </div>
            <div
              class="text-surface-700 dark:text-surface-200 text-lg font-semibold leading-snug"
            >
              {{ item.title }}
            </div>
          </div>
        </div>
        <div
          class="text-surface-600 dark:text-surface-300 font-normal leading-relaxed"
        >
          {{ item.description }}
        </div>
      </div>
      }
    </div>
  </div>
</div>
