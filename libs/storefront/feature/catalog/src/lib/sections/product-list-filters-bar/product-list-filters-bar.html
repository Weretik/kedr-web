<div class="bg-neutral-50 dark:bg-surface-900 px-6 md:px-12 lg:px-20 pt-12">
  <div class="flex flex-col lg:flex-row justify-start items-center gap-4 mb-6">
    <div class="flex-1 flex flex-col justify-start items-start gap-2">
      <div
        class="text-surface-900 dark:text-surface-0 text-2xl font-semibold leading-tight"
      >
        {{ categoryName() }}
      </div>
    </div>

    <div class="flex flex-wrap flex-col sm:flex-row gap-4 items-center">
      <p-toggleButton
        [ngModel]="draftIsSale()"
        (ngModelChange)="setSaleFilter($event)"
        onLabel="Краща ціна"
        offLabel="Краща ціна"
        onIcon="pi pi-check"
        offIcon="pi pi-times"
        class="bg-surface-100 dark:bg-surface-800 border-surface-200 dark:border-surface-700 rounded-border shrink-0"
      ></p-toggleButton>
      <p-toggleButton
        [ngModel]="draftIsNew()"
        (ngModelChange)="setNewFilter($event)"
        onLabel="Новинки"
        offLabel="Новинки"
        onIcon="pi pi-check"
        offIcon="pi pi-times"
        class="bg-surface-100 dark:bg-surface-800 border-surface-200 dark:border-surface-700 rounded-border shrink-0"
      ></p-toggleButton>
      <p-toggleButton
        [ngModel]="draftInStock()"
        (ngModelChange)="setInStockFilter($event)"
        onLabel="В наявноті"
        offLabel="Всі"
        onIcon="pi pi-check"
        offIcon="pi pi-times"
        class="bg-surface-100 dark:bg-surface-800 border-surface-200 dark:border-surface-700 rounded-border shrink-0"
      ></p-toggleButton>
    </div>

    <div class="flex flex-col justify-start items-start">
      <p-menu
        #sortMenu
        [model]="sortOptions"
        [popup]="true"
        [appendTo]="'body'"
      ></p-menu>
      <button
        pButton
        severity="secondary"
        [outlined]="true"
        (click)="sortMenu.toggle($event)"
      >
        <i pButtonIcon class="pi pi-sort-alt"></i>
        <span pButtonLabel>Сортувати</span>
      </button>
    </div>
  </div>

  <p-divider class="w-full mb-6!"></p-divider>

  <div class="flex flex-col lg:flex-row gap-8">
    <div class="w-full lg:w-60 flex flex-col justify-start items-start">
