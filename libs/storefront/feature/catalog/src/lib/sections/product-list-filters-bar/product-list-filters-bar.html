<div class="bg-neutral-50 dark:bg-surface-900 px-6 md:px-12 lg:px-20 pt-12">
  @if (isSticky()) {
  <div class="h-20 mb-6"></div>
  }
  <div
    [class.mb-6]="!isSticky()"
    class="flex flex-col sm:flex-row justify-center items-center sm:items-center gap-4"
    [ngClass]="{
    'fixed top-22 left-0 right-0 z-1000 bg-neutral-50 dark:bg-surface-900 px-6 md:px-12 lg:px-18 py-2 shadow-md': isSticky()
    }"
  >
    <div
      class="w-full sm:flex-1 flex flex-col justify-start items-center sm:items-start gap-2"
      [class.hidden]="isSticky()"
    >
      <div
        class="flex flex-wrap items-center gap-x-1 gap-y-1 text-surface-900 dark:text-surface-0 text-lg sm:text-xl lg:text-2xl font-semibold leading-tight"
      >
        <button
          type="button"
          i18n="@@catalog.filters.allProducts"
          class="cursor-pointer text-primary hover:text-primary-emphasis transition-colors whitespace-nowrap"
          (click)="goToAllProducts()"
        >
          Всі товари
        </button>
        @if (categoryPath().length) { @for (crumb of categoryPath(); track
        crumb.slug; let isLast = $last) {
        <span class="mx-0.5 sm:mx-1 text-surface-500 dark:text-surface-400"
          >&rarr;</span
        >
        @if (isLast) {
        <span
          class="text-surface-900 dark:text-surface-0"
          [title]="crumb.label"
        >
          {{ crumb.label }}
        </span>
        } @else {
        <button
          type="button"
          class="cursor-pointer text-primary hover:text-primary-emphasis transition-colors max-w-44 sm:max-w-64 lg:max-w-88 truncate"
          [title]="crumb.label"
          (click)="goToCategoryBySlug(crumb.slug)"
        >
          {{ crumb.label }}
        </button>
        } } }
      </div>
    </div>

    <div
      class="flex flex-row flex-nowrap gap-1 sm:gap-4 justify-center sm:justify-start items-center w-full sm:w-auto"
    >
      <div class="hidden lg:flex flex-row gap-4 items-center">
        <p-toggleButton
          [ngModel]="draftIsSale()"
          (ngModelChange)="setSaleFilter($event)"
          i18n-onLabel="@@catalog.filters.sale"
          onLabel="Краща ціна"
          i18n-offLabel="@@catalog.filters.sale"
          offLabel="Краща ціна"
          onIcon="pi pi-check"
          offIcon="pi pi-times"
          class="bg-surface-100 dark:bg-surface-800 border-surface-200 dark:border-surface-700 rounded-border shrink flex-1 sm:flex-none min-w-0"
        ></p-toggleButton>
        <p-toggleButton
          [ngModel]="draftIsNew()"
          (ngModelChange)="setNewFilter($event)"
          i18n-onLabel="@@catalog.filters.new"
          onLabel="Новинки"
          i18n-offLabel="@@catalog.filters.new"
          offLabel="Новинки"
          onIcon="pi pi-check"
          offIcon="pi pi-times"
          class="bg-surface-100 dark:bg-surface-800 border-surface-200 dark:border-surface-700 rounded-border shrink flex-1 sm:flex-none min-w-0"
        ></p-toggleButton>
        <p-toggleButton
          [ngModel]="draftInStock()"
          (ngModelChange)="setInStockFilter($event)"
          i18n-onLabel="@@catalog.filters.inStock"
          onLabel="В наявноті"
          i18n-offLabel="@@catalog.filters.all"
          offLabel="Всі"
          onIcon="pi pi-check"
          offIcon="pi pi-times"
          class="bg-surface-100 dark:bg-surface-800 border-surface-200 dark:border-surface-700 rounded-border shrink flex-1 sm:flex-none min-w-0"
        ></p-toggleButton>
      </div>

      <div
        class="flex lg:hidden flex-1 justify-center sm:justify-start items-center"
      >
        <button
          type="button"
          pButton
          severity="secondary"
          [outlined]="true"
          (click)="paramsPopover.toggle($event)"
        >
          <span pButtonLabel i18n="@@catalog.filters.parameters"
            >Параметри</span
          >
          <i pButtonIcon class="pi pi-chevron-down"></i>
        </button>
        <p-popover #paramsPopover>
          <div class="flex flex-col gap-3 p-1">
            <p-toggleButton
              [ngModel]="draftIsSale()"
              (ngModelChange)="setSaleFilter($event)"
              i18n-onLabel="@@catalog.filters.sale"
              onLabel="Краща ціна"
              i18n-offLabel="@@catalog.filters.sale"
              offLabel="Краща ціна"
              onIcon="pi pi-check"
              offIcon="pi pi-times"
              class="w-full bg-surface-100 dark:bg-surface-800 border-surface-200 dark:border-surface-700 rounded-border"
            ></p-toggleButton>
            <p-toggleButton
              [ngModel]="draftIsNew()"
              (ngModelChange)="setNewFilter($event)"
              i18n-onLabel="@@catalog.filters.new"
              onLabel="Новинки"
              i18n-offLabel="@@catalog.filters.new"
              offLabel="Новинки"
              onIcon="pi pi-check"
              offIcon="pi pi-times"
              class="w-full bg-surface-100 dark:bg-surface-800 border-surface-200 dark:border-surface-700 rounded-border"
            ></p-toggleButton>
            <p-toggleButton
              [ngModel]="draftInStock()"
              (ngModelChange)="setInStockFilter($event)"
              i18n-onLabel="@@catalog.filters.inStock"
              onLabel="В наявноті"
              i18n-offLabel="@@catalog.filters.all"
              offLabel="Всі"
              onIcon="pi pi-check"
              offIcon="pi pi-times"
              class="w-full bg-surface-100 dark:bg-surface-800 border-surface-200 dark:border-surface-700 rounded-border"
            ></p-toggleButton>
          </div>
        </p-popover>
      </div>
    </div>

    <div class="flex flex-col justify-start items-center sm:items-start">
      @defer (on immediate) {
      <p-menu
        #sortMenu
        [model]="sortOptions"
        [popup]="true"
        [appendTo]="'body'"
      ></p-menu>
      <button
        type="button"
        pButton
        severity="secondary"
        [outlined]="true"
        (click)="sortMenu.toggle($event)"
      >
        <i pButtonIcon class="pi pi-sort-alt"></i>
        <span pButtonLabel i18n="@@catalog.filters.sort">Сортувати</span>
      </button>
      }
    </div>
  </div>

  <p-divider class="w-full mb-6!"></p-divider>
