<div
  class="-m-3 flex min-h-[calc(100vh+9rem)] bg-neutral-50 dark:bg-surface-900"
>
  <div
    class="w-80 shrink-0 min-h-[calc(100vh+9rem)] border-r border-neutral-500 bg-linear-to-b from-neutral-600 to-neutral-500 flex flex-col select-none"
  >
    <div class="p-4 flex items-center gap-3 border-b border-neutral-400/50">
      <i class="pi pi-user text-surface-0"></i>
      <span class="text-base font-semibold text-surface-0">
        {{ 'cabinet.sidebar.title' | transloco }}
      </span>
    </div>

    <div class="overflow-y-auto flex-1 p-2 flex flex-col gap-3">
      @for (group of groups; track group.labelKey) {
      <ul class="list-none m-0 p-0">
        <li>
          <button
            type="button"
            (click)="toggleGroup(group)"
            class="w-full flex items-center cursor-pointer p-3 gap-3 rounded-lg text-surface-0 hover:bg-neutral-400/40 transition-colors duration-150"
          >
            <span class="font-semibold text-sm"
              >{{ group.labelKey | transloco }}</span
            >
            <i
              class="pi text-surface-400 ml-auto"
              [ngClass]="group.expanded ? 'pi-angle-up' : 'pi-angle-down'"
            ></i>
          </button>

          @if (group.expanded) {
          <ul class="list-none m-0 p-0 overflow-hidden flex flex-col gap-1">
            @for (item of group.items; track item.labelKey) {
            <li>
              @if (item.route) {
              <a
                [routerLink]="item.route"
                routerLinkActive="bg-neutral-400/50 text-surface-0"
                class="flex items-center p-3 gap-2 rounded-lg text-surface-100 hover:bg-neutral-400/40 hover:text-surface-0 transition-colors duration-150"
              >
                <i class="pi" [ngClass]="item.icon"></i>
                <span class="text-sm">{{ item.labelKey | transloco }}</span>
                <p-badge
                  value="Скоро"
                  size="small"
                  severity="secondary"
                  class="ml-auto"
                ></p-badge>
              </a>
              } @else {
              <a
                class="flex items-center p-3 gap-2 rounded-lg text-surface-100 hover:bg-neutral-400/40 hover:text-surface-0 transition-colors duration-150"
              >
                <i class="pi" [ngClass]="item.icon"></i>
                <span class="text-sm">{{ item.labelKey | transloco }}</span>
                <p-badge
                  value="Скоро"
                  size="small"
                  severity="secondary"
                  class="ml-auto"
                ></p-badge>
              </a>
              }
            </li>
            }
          </ul>
          }
        </li>
      </ul>
      }
    </div>
  </div>

  <div
    class="min-h-[calc(100vh+9rem)] flex-1 bg-neutral-50 p-6 dark:bg-surface-900"
  >
    <router-outlet></router-outlet>
  </div>
</div>
