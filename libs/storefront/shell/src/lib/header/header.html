<div
  class="bg-white/95 dark:bg-surface-900 border-b border-surface-200 dark:border-surface-700 relative"
>
  <div
    class="cart left-0 right-0 z-1001 px-4 lg:px-20 py-4 bg-white/95 dark:bg-neutral-500 flex justify-between items-center gap-2 lg:gap-8"
    [class.fixed]="isSticky()"
    [class.top-0]="isSticky()"
  >
    <div class="flex items-center gap-6">
      <div class="flex justify-start items-center gap-4">
        <a routerLink="/" class="flex items-center">
          <img
            ngSrc="assets/logo/main-logo.svg"
            width="100"
            height="50"
            [attr.alt]="'header.logoAlt' | transloco"
            class="h-10 sm:h-14 w-auto"
          />
        </a>
      </div>
      <div class="hidden lg:block">
        <lib-header-contacts
          (copyPhone)="copyToClipboard('+3800687135049')"
        ></lib-header-contacts>
      </div>
    </div>

    <div
      class="flex-1 hidden lg:flex flex-col justify-start items-start gap-2 mx-8"
    >
      <lib-header-search
        [draftSearch]="pageState.draftSearch()"
        [historyItems]="hasHistory()"
        (searchRequest)="onSearch($event.value, $event.popover)"
        (draftSearchChange)="
          onSearchDraftChange($event.value, $event.popover, $event.event)
        "
        (showHistory)="showSearchHistory($event.popover, $event.event)"
        (useHistoryItem)="useHistoryItem($event.value, $event.popover)"
        (removeHistoryItem)="removeHistoryItem($event.value, $event.popover)"
        (clearHistoryRequest)="clearHistory($event)"
      ></lib-header-search>
    </div>

    <div class="flex items-center">
      <lib-header-actions
        [currentLocale]="currentLocale()"
        [isDark]="themeService.isDark()"
        [cartItemsCount]="cart.itemsCount()"
        (localeChange)="switchLocale($event)"
        (toggleTheme)="themeService.toggleTheme()"
        (openCart)="cartUi.open()"
      ></lib-header-actions>
      <div class="lg:hidden">
        <lib-header-contacts
          [mobile]="true"
          (copyPhone)="copyToClipboard('+3800687135049')"
        ></lib-header-contacts>
      </div>
    </div>
  </div>

  <div class="px-4 pb-4 bg-white/95 dark:bg-neutral-500 block lg:hidden">
    <lib-header-search
      [mobile]="true"
      [draftSearch]="pageState.draftSearch()"
      [historyItems]="hasHistory()"
      (searchRequest)="onSearch($event.value, $event.popover)"
      (draftSearchChange)="
        onSearchDraftChange($event.value, $event.popover, $event.event)
      "
      (showHistory)="showSearchHistory($event.popover, $event.event)"
      (useHistoryItem)="useHistoryItem($event.value, $event.popover)"
      (removeHistoryItem)="removeHistoryItem($event.value, $event.popover)"
      (clearHistoryRequest)="clearHistory($event)"
    ></lib-header-search>
  </div>
</div>

<div
  class="card relative z-1000 bg-white/95 dark:bg-neutral-500 backdrop-blur border-b border-surface-400 dark:border-surface-600"
>
  <p-megaMenu [model]="items()" [pt]="megaMenuPt">
    <ng-template #item let-item>
      @if (item.root) {
      <a
        pRipple
        [routerLink]="item.routerLink"
        class="flex items-center cursor-pointer px-4 py-1 overflow-hidden relative font-semibold text-base uppercase"
        style="border-radius: 2rem"
      >
        <i [ngClass]="item.icon"></i>
        <span class="ml-2">{{ item.label }}</span>

        @if (item.items?.length) {
        <i class="pi pi-angle-down ml-2" aria-hidden="true"></i>
        }
      </a>
      } @else if (item.sectionHeader) {
      <div
        class="flex flex-col items-start px-4 mb-2 gap-2 cursor-default pointer-events-none select-none w-full min-h-40 !opacity-100"
      >
        <img
          [src]="item.image"
          [alt]="item.label"
          class="w-full h-40 object-cover rounded-md"
        />
        <span
          class="text-base !text-primary dark:!text-primary !opacity-100 font-semibold overflow-hidden"
        >
          {{ item.label }}
        </span>
      </div>
      } @else if (!item.image) {
      <a
        class="flex items-center px-4 cursor-pointer mb-1.5 gap-2"
        [routerLink]="item.routerLink"
      >
        <span class="inline-flex flex-col gap-1">
          <span class="text-base text-surface-900 dark:text-surface-0">
            {{ item.label }}
          </span>
        </span>
      </a>
      } @else {
      <div class="flex flex-col items-start gap-4">
        <img
          [src]="item.image"
          [attr.alt]="'header.wholesaleLogoAlt' | transloco"
          class="w-full"
        />
        <span>{{ item.subtext }}</span>
        <p-button
          [label]="item.label"
          [outlined]="true"
          [routerLink]="item.routerLink"
        ></p-button>
      </div>
      }
    </ng-template>
  </p-megaMenu>
</div>

<lib-cart />
