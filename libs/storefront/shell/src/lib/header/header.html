<div
  class="bg-white/95 dark:bg-surface-900 border-b border-surface-200 dark:border-surface-700 relative"
>
  <div
    class="cart left-0 right-0 z-1001 px-4 lg:px-20 py-4 bg-white/95 dark:bg-neutral-500 flex justify-between items-center gap-2 lg:gap-8"
    [class.fixed]="isSticky()"
    [class.top-0]="isSticky()"
  >
    <div class="flex items-center gap-6">
      <div class="flex justify-start items-center gap-4">
        <a routerLink="/" class="flex items-center">
          <img
            ngSrc="/assets/logo/main-logo.svg"
            width="100"
            height="50"
            alt="Kedr Logo"
            class="h-10 sm:h-14 w-auto"
          />
        </a>
      </div>
      <div class="hidden lg:flex items-center gap-3">
        <div
          class="flex items-center cursor-pointer transition-transform ease-out duration-200 hover:text-primary-500 hover:translate-x-1"
          role="button"
          tabindex="0"
          (click)="copyToClipboard('+3800687135049')"
          (keydown.enter)="copyToClipboard('+3800687135049')"
          (keydown.space)="copyToClipboard('+3800687135049'); $event.preventDefault()"
        >
          <i class="pi pi-phone text-lg leading-none mr-4"></i>
          <span class="text-base font-medium">(068) 713-50-49</span>
        </div>

        <a
          href="https://t.me/+380687135049"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Написать в Telegram"
          class="w-8 h-8 rounded-full border border-surface-200 dark:border-surface-700 bg-surface-0 dark:bg-surface-900 hover:border-primary-500 hover:scale-105 focus-visible:outline focus-visible:outline-2 focus-visible:outline-primary-500 transition-all duration-200 flex items-center justify-center"
        >
          <img
            src="https://cdn.simpleicons.org/telegram"
            width="16"
            height="16"
            alt="Telegram"
          />
        </a>

        <a
          href="viber://chat?number=%2B380687135049"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Написать в Viber"
          class="w-8 h-8 rounded-full border border-surface-200 dark:border-surface-700 bg-surface-0 dark:bg-surface-900 hover:border-primary-500 hover:scale-105 focus-visible:outline focus-visible:outline-2 focus-visible:outline-primary-500 transition-all duration-200 flex items-center justify-center"
        >
          <img
            src="https://cdn.simpleicons.org/viber"
            width="16"
            height="16"
            alt="Viber"
          />
        </a>
      </div>
    </div>

    <div
      class="flex-1 hidden lg:flex flex-col justify-start items-start gap-2 mx-8"
    >
      <div class="w-full flex items-stretch">
        <div
          class="flex-1 px-3 py-2 bg-surface-0 dark:bg-surface-900 rounded-border shadow-sm border border-surface flex items-center gap-3"
        >
          <i
            class="pi pi-search text-surface-500 dark:text-surface-400 text-base! leading-none!"
          ></i>

          <input
            #searchInput
            type="text"
            [value]="pageState.draftSearch()"
            (input)="pageState.setSearchDraft(searchInput.value)"
            placeholder="Пошук товарів по артикулу або назві"
            class="flex-1 bg-transparent border-0 outline-0 text-surface-500 dark:text-surface-400 text-base font-normal"
            (keydown.enter)="onSearch(searchInput.value)"
          />
        </div>
        <button
          pButton
          type="button"
          (click)="onSearch(searchInput.value)"
          class="shadow-sm"
          [style.padding]="'0 0.75rem'"
        >
          <i class="pi pi-search"></i>
        </button>
      </div>
    </div>

    <div class="flex justify-around items-center">
      <div class="lg:hidden">
        <button
          pButton
          severity="secondary"
          [text]="true"
          [rounded]="true"
          class="w-10 h-10 text-surface-500! dark:text-surface-400!"
          aria-label="Контакты"
          (click)="phonePopover.toggle($event)"
        >
          <i class="pi pi-phone"></i>
        </button>
        <p-popover #phonePopover>
          <div class="flex flex-col gap-3 min-w-56">
            <button
              type="button"
              class="flex items-center cursor-pointer transition-transform ease-out duration-200 hover:text-primary-500 hover:translate-x-1"
              (click)="copyToClipboard('+3800687135049')"
            >
              <i class="pi pi-phone text-lg leading-none mr-3"></i>
              <span class="text-base font-medium">(068) 713-50-49</span>
            </button>
            <div class="flex items-center gap-3">
              <a
                href="https://t.me/+380687135049"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Написать в Telegram"
                class="w-9 h-9 rounded-full border border-surface-200 dark:border-surface-700 bg-surface-0 dark:bg-surface-900 hover:border-primary-500 hover:scale-105 focus-visible:outline focus-visible:outline-2 focus-visible:outline-primary-500 transition-all duration-200 flex items-center justify-center"
              >
                <img
                  src="https://cdn.simpleicons.org/telegram"
                  width="18"
                  height="18"
                  alt="Telegram"
                />
              </a>
              <a
                href="viber://chat?number=%2B380687135049"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Написать в Viber"
                class="w-9 h-9 rounded-full border border-surface-200 dark:border-surface-700 bg-surface-0 dark:bg-surface-900 hover:border-primary-500 hover:scale-105 focus-visible:outline focus-visible:outline-2 focus-visible:outline-primary-500 transition-all duration-200 flex items-center justify-center"
              >
                <img
                  src="https://cdn.simpleicons.org/viber"
                  width="18"
                  height="18"
                  alt="Viber"
                />
              </a>
            </div>
          </div>
        </p-popover>
      </div>
      <button
        pButton
        severity="secondary"
        [text]="true"
        [rounded]="true"
        (click)="themeService.toggleTheme()"
        class="w-10 h-10 text-surface-500! dark:text-surface-400!"
        aria-label="Змінити тему"
      >
        <i
          class="pi"
          [ngClass]="themeService.isDark() ? 'pi-moon' : 'pi-sun'"
        ></i>
      </button>
      <button
        pButton
        severity="secondary"
        [text]="true"
        [rounded]="true"
        class="w-10 h-10 text-surface-500! dark:text-surface-400!"
        aria-label="Аккаунт"
      >
        <i class="pi pi-user"></i>
      </button>
      <p-overlaybadge
        severity="success"
        [value]="cart.itemsCount()"
        badgeSize="small"
        [pt]="{ pcBadge: { root: { class: '-translate-x-2 translate-y-2 scale-80' } } }"
        [hidden]="cart.itemsCount() === 0"
      >
        <button
          pButton
          (click)="cartUi.open()"
          severity="secondary"
          class="w-10 h-10 text-surface-500! dark:text-surface-400!"
          [text]="true"
          [rounded]="true"
        >
          <i class="pi pi-shopping-cart"></i>
        </button>
      </p-overlaybadge>
      @if (cart.itemsCount() === 0) {
      <button
        pButton
        (click)="cartUi.open()"
        severity="secondary"
        class="w-10 h-10 text-surface-500! dark:text-surface-400!"
        [text]="true"
        [rounded]="true"
      >
        <i class="pi pi-shopping-cart"></i>
      </button>
      }
    </div>
  </div>

  <div class="px-4 pb-4 bg-white/95 dark:bg-neutral-500 block lg:hidden">
    <div class="w-full flex items-stretch">
      <div
        class="flex-1 px-3 py-2 bg-surface-0 dark:bg-surface-900 rounded-border shadow-sm border border-surface flex justify-start items-center gap-3"
      >
        <i
          class="pi pi-search text-surface-500 dark:text-surface-400 text-base! leading-none!"
        ></i>
        <input
          #mobileSearchInput
          type="text"
          [value]="pageState.draftSearch()"
          (input)="pageState.setSearchDraft(mobileSearchInput.value)"
          placeholder="Пошук товарів по артикулу або назві"
          class="flex-1 bg-transparent border-0 outline-0 text-surface-500 dark:text-surface-400 text-base font-normal"
          (keydown.enter)="onSearch(mobileSearchInput.value)"
        />
      </div>
      <button
        pButton
        type="button"
        (click)="onSearch(mobileSearchInput.value)"
        class="shadow-sm"
        [style.padding]="'0 0.75rem'"
      >
        <i class="pi pi-search"></i>
      </button>
    </div>
  </div>
</div>

<div
  class="card relative z-1000 bg-white/95 dark:bg-neutral-500 backdrop-blur border-b border-surface-400 dark:border-surface-600"
>
  <p-megaMenu [model]="items" [pt]="megaMenuPt">
    <ng-template #item let-item>
      @if (item.root) {
      <a
        pRipple
        [routerLink]="item.routerLink"
        class="flex items-center cursor-pointer px-4 py-1 overflow-hidden relative font-semibold text-base uppercase"
        style="border-radius: 2rem"
      >
        <i [ngClass]="item.icon"></i>
        <span class="ml-2">{{ item.label }}</span>

        @if (item.items?.length) {
        <i class="pi pi-angle-down ml-2" aria-hidden="true"></i>
        }
      </a>
      } @else if (item.sectionHeader) {
      <div
        class="flex flex-col items-start px-4 mb-2 gap-2 cursor-default pointer-events-none select-none w-full min-h-40 !opacity-100"
      >
        <img
          [src]="item.image"
          [alt]="item.label"
          class="w-full h-40 object-cover rounded-md"
        />
        <span
          class="text-base !text-primary dark:!text-primary !opacity-100 font-semibold overflow-hidden"
        >
          {{ item.label }}
        </span>
      </div>
      } @else if (!item.image) {
      <a
        class="flex items-center px-4 cursor-pointer mb-1.5 gap-2"
        [routerLink]="item.routerLink"
      >
        <span class="inline-flex flex-col gap-1">
          <span class="text-base text-surface-900 dark:text-surface-0">
            {{ item.label }}
          </span>
        </span>
      </a>
      } @else {
      <div class="flex flex-col items-start gap-4">
        <img [src]="item.image" alt="wholesale-logo" class="w-full" />
        <span>{{ item.subtext }}</span>
        <p-button
          [label]="item.label"
          [outlined]="true"
          [routerLink]="item.routerLink"
        ></p-button>
      </div>
      }
    </ng-template>
  </p-megaMenu>
</div>

<lib-cart />
